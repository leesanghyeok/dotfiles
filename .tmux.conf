# ── General ──────────────────────────────────────────────────────────────────

set -g default-terminal 'screen-256color'
set -g mouse on
set -sg escape-time 0
set -g history-limit 10000
set -g base-index 1
set -g renumber-windows on
set -g allow-rename off
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set-window-option -g pane-base-index 1

# ── Prefix ───────────────────────────────────────────────────────────────────

set -g prefix2 C-s
bind-key C-b send-prefix
bind-key C-s send-prefix -2

# ── Key Bindings ─────────────────────────────────────────────────────────────

## Windows & Panes

bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+
bind v copy-mode

## Copy Mode

setw -g mode-keys vi
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

## Misc

bind r source-file ~/.tmux.conf \; display "Reloaded!"
unbind-key C-z

# ── Theme ─────────────────────────────────────────────────────────────────────

set -g status-style bg='#1e1e2e',fg='#6c7086'
set -g window-status-style bg='#1e1e2e',fg='#6c7086'
set -g window-status-current-style bg='#89b4fa',fg='#1e1e2e',bold
set -g status-left ''
set -g status-right ''

set -g message-style bg='#313244',fg='#cdd6f4'
set -g message-command-style bg='#313244',fg='#cdd6f4'

set -g mode-style bg='#89b4fa',fg='#1e1e2e'

set -g pane-border-style fg='#313244'
set -g pane-active-border-style fg='#89b4fa'
