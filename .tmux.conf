set -g default-terminal 'screen-256color'
set -g mouse on

# Pane resize (Ctrl+b 후 H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# v로 선택 시작, y로 복사, r로 사각형 선택 (vim 방식과 동일하게)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
 
# | 로 좌우 분할, - 로 상하 분할 (기호가 분할 방향을 직관적으로 표현)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# prefix + r 로 tmux 재시작 없이 설정 반영
bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g prefix2 C-s

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# Catppuccin style status bar
set -g status-style bg='#1e1e2e',fg='#6c7086'
set -g window-status-style bg='#1e1e2e',fg='#6c7086'
set -g window-status-current-style bg='#89b4fa',fg='#1e1e2e',bold

# Command prompt (prefix + :)
set -g message-style bg='#313244',fg='#cdd6f4'
set -g message-command-style bg='#313244',fg='#cdd6f4'

# Copy mode (prefix + [)
set -g mode-style bg='#89b4fa',fg='#1e1e2e'

# remove administrative debris (session name, hostname, time) in status bar
set -g status-left ''
set -g status-right ''

# increase scrollback lines
set -g history-limit 10000

# prefix -> back-one-character
bind-key C-b send-prefix
# prefix-2 -> forward-incremental-history-search
bind-key C-s send-prefix -2

# don't suspend-client
unbind-key C-z

set -g pane-border-style fg='#313244'
set -g pane-active-border-style fg='#89b4fa'

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# c로 새 윈도우 열 때 현재 디렉토리 유지
bind c new-window -c "#{pane_current_path}"

# tmux가 실행중인 명령어로 윈도우 이름을 덮어쓰지 않게
set -g allow-rename off

# ESC 키 입력 후 tmux가 기다리는 시간을 0으로 (Neovim/Vim ESC 즉시 반응)
set -sg escape-time 0



